services:
  - type: web
    name: satya-pos-backend
    runtime: node
    rootDir: pos-backend
    plan: free
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is provided automatically by Render; app.js already falls back to it
      - key: MONGODB_URI
        sync: false        # set manually in Render dashboard (Atlas connection string)
      - key: JWT_SECRET
        sync: false        # set manually in Render dashboard
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false        # set to your Vercel URL, e.g. https://satya-pos.vercel.app
